services:
  ollama:
    image: ollama/ollama:latest
    container_name: baugenehmigungs-ki-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11443:11434"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8510:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
